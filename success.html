<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="shortcut icon" type="x-icon" href="images/gc.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"
      rel="stylesheet"
    />
    <title>Message sent — Shaliah Fricas</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: "Inter", sans-serif;
        background: #070b18;
        color: #eaf0fb;
        min-height: 100vh;
        display: grid;
        place-items: center;
        text-align: center;
        padding: 2rem;
        background-image:
          linear-gradient(rgba(80,120,210,0.07) 1px, transparent 1px),
          linear-gradient(90deg, rgba(80,120,210,0.07) 1px, transparent 1px);
        background-size: 46px 46px;
      }
      .card {
        max-width: 480px;
        border: 1px solid rgba(126,148,200,0.22);
        border-radius: 18px;
        padding: 3rem 2.2rem;
        background: linear-gradient(180deg, #0f1730, #0a1020);
      }
      .check {
        width: 4.5rem;
        height: 4.5rem;
        margin: 0 auto 1.4rem;
        border-radius: 50%;
        display: grid;
        place-items: center;
        font-size: 2.4rem;
        color: #fff;
        background: linear-gradient(135deg, #2d7dff, #ff2e88);
        box-shadow: 0 12px 30px -8px rgba(255,46,136,0.5);
      }
      h1 {
        font-family: "Space Grotesk", sans-serif;
        font-size: 1.9rem;
        letter-spacing: -0.5px;
        margin-bottom: 0.7rem;
      }
      p { color: #9aa8c8; margin-bottom: 1.8rem; }
      .code {
        font-family: "JetBrains Mono", monospace;
        font-size: 0.72rem;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        color: #34e1d4;
        margin-bottom: 1.4rem;
        display: block;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        font-weight: 600;
        padding: 0.85rem 1.6rem;
        border-radius: 999px;
        background: linear-gradient(135deg, #2d7dff, #ff2e88);
        color: #fff;
        text-decoration: none;
        transition: transform 0.25s ease;
      }
      .btn:hover { transform: translateY(-2px); }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="check"><i class="bx bx-check"></i></div>
      <span class="code">// transmission received</span>
      <h1>Message sent</h1>
      <p>Thanks for reaching out — I'll get back to you as soon as I can.</p>
      <a href="https://shyfricas.github.io/portfolio/" class="btn">
        <i class="bx bx-left-arrow-alt"></i> Back to portfolio
      </a>
    </div>
  </body>
</html>
